<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>CIRQUIZ — Concept B</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f14;
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        h1.page-title {
            font-family: 'Fredoka One', cursive;
            font-size: 22px; letter-spacing: 4px; color: #3498DB;
            margin-bottom: 4px; text-align: center;
            text-shadow: 0 0 30px rgba(52,152,219,0.5);
        }
        .page-sub {
            color: rgba(255,255,255,0.3); font-size: 11px;
            letter-spacing: 2px; text-transform: uppercase;
            margin-bottom: 36px; text-align: center;
        }
        .phone {
            width: 320px; height: 660px; border-radius: 40px;
            overflow: hidden; position: relative; background: #fff;
            box-shadow:
                    0 0 0 2px rgba(255,255,255,0.08),
                    0 40px 80px rgba(0,0,0,0.7),
                    inset 0 0 0 1px rgba(255,255,255,0.04);
        }
        .cb-bg {
            position: absolute; inset: 0;
            background: linear-gradient(160deg, #EBF5FB 0%, #fff 45%, #f3eeff 100%);
        }
        .cb-shape {
            position: absolute; border-radius: 50%; opacity: 0.13;
            animation: cbBounce var(--dur,4s) ease-in-out infinite alternate;
            animation-delay: var(--delay, 0s);
        }
        @keyframes cbBounce {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(var(--tx,10px), var(--ty,-15px)) scale(1.1); }
        }
        .cb-settings-icon {
            position: absolute; top: 16px; right: 16px;
            font-size: 22px; cursor: pointer; opacity: 0.28;
            animation: cbSettingsSpin 10s linear infinite;
        }
        @keyframes cbSettingsSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        /* ── Avatar rows ── */
        .cb-parade, .cb-bottom-chars {
            position: absolute; left: 0; right: 0;
            display: flex; justify-content: center; gap: 8px; padding: 0 14px;
        }
        .cb-parade { top: 52px; animation: rowReveal 0.6s ease both; }
        .cb-bottom-chars { bottom: 178px; animation: rowReveal 0.6s ease 0.3s both; }
        @keyframes rowReveal {
            from { opacity: 0; transform: translateY(-24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .cb-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--color, white);
            box-shadow: 0 3px 12px rgba(0,0,0,0.15), 0 0 0 2.5px rgba(255,255,255,0.6) inset;
            border: none;
            overflow: hidden; padding: 4px; flex-shrink: 0;
            animation: cbBob calc(2.5s + var(--i,0) * 0.28s) ease-in-out infinite alternate;
            animation-delay: calc(var(--i,0) * 0.12s);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .cb-avatar:hover {
            transform: scale(1.28) translateY(-7px) !important;
            box-shadow: 0 8px 20px rgba(0,0,0,0.22), 0 0 0 2.5px rgba(255,255,255,0.7) inset;
        }
        @keyframes cbBob {
            from { transform: translateY(0) rotate(-4deg); }
            to   { transform: translateY(-10px) rotate(4deg); }
        }
        .cb-bottom-char {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--color, white);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15), 0 0 0 2.5px rgba(255,255,255,0.6) inset;
            border: none;
            overflow: hidden; padding: 5px; flex-shrink: 0;
            animation: cbBob calc(2.8s + var(--i,0) * 0.3s) ease-in-out infinite alternate;
            animation-delay: calc(var(--i,0) * 0.15s + 0.4s);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .cb-bottom-char:hover {
            transform: scale(1.22) translateY(-6px) !important;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2), 0 0 0 2.5px rgba(255,255,255,0.7) inset;
        }
        /* ── Hero ── */
        .cb-hero {
            position: absolute; top: 152px; left: 0; right: 0;
            display: flex; flex-direction: column; align-items: center;
            animation: cbHeroReveal 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
        }
        @keyframes cbHeroReveal {
            from { opacity: 0; transform: scale(0.7); }
            to   { opacity: 1; transform: scale(1); }
        }
        .cb-badge {
            background: linear-gradient(135deg, #3498DB, #9B59B6);
            border-radius: 24px; padding: 5px 18px; margin-bottom: 16px;
            font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
            color: white; font-weight: 800;
            box-shadow: 0 4px 16px rgba(52,152,219,0.28);
            animation: badgePop 2s ease-in-out infinite alternate;
        }
        @keyframes badgePop {
            from { transform: scale(1); }
            to   { transform: scale(1.04); box-shadow: 0 6px 24px rgba(52,152,219,0.45); }
        }
        .cb-title {
            font-family: 'Fredoka One', cursive; font-size: 56px; letter-spacing: 5px; line-height: 1;
            background: linear-gradient(140deg, #3498DB 0%, #9B59B6 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 14px rgba(52,152,219,0.18));
        }
        .cb-sub {
            margin-top: 10px; font-size: 14px; font-weight: 700; letter-spacing: 1px; color: #999;
        }
        /* ── CTA ── */
        .cb-cta {
            position: absolute; bottom: 52px; left: 22px; right: 22px;
            display: flex; flex-direction: column; gap: 11px;
        }
        .cb-btn-main {
            background: #2ECC71; border: none; border-radius: 18px; padding: 20px;
            font-family: 'Fredoka One', cursive; font-size: 22px; letter-spacing: 2px;
            color: white; cursor: pointer; width: 100%;
            box-shadow: 0 6px 0 #27ae60, 0 10px 24px rgba(46,204,113,0.32);
            transition: transform 0.1s, box-shadow 0.1s;
            animation: cbBtnEntrance 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.55s both;
            position: relative; overflow: hidden;
        }
        .cb-btn-main::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            animation: btnShine 3.5s ease-in-out infinite; animation-delay: 1.5s;
        }
        @keyframes btnShine {
            0%  { left: -100%; } 35% { left: 140%; } 100% { left: 140%; }
        }
        @keyframes cbBtnEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .cb-btn-main:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #27ae60, 0 14px 30px rgba(46,204,113,0.48); }
        .cb-btn-main:active { transform: translateY(5px); box-shadow: 0 1px 0 #27ae60, 0 4px 12px rgba(46,204,113,0.28); }
        .cb-btn-settings {
            background: none; border: 2px solid #e8e8e8; border-radius: 14px; padding: 13px;
            font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; color: #bbb;
            cursor: pointer; letter-spacing: 1px;
            animation: cbBtnEntrance 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.68s both;
            transition: border-color 0.2s, color 0.2s;
        }
        .cb-btn-settings:hover { border-color: #ccc; color: #999; }
    </style>
</head>
<body>
