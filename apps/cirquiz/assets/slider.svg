<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
    <defs>
        <linearGradient id="trackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#5d6d7e"/>
            <stop offset="100%" stop-color="#2c3e50"/>
        </linearGradient>
        <radialGradient id="knob1" cx="35%" cy="30%" r="65%">
            <stop offset="0%"   stop-color="#5dade2"/>
            <stop offset="100%" stop-color="#1a5276"/>
        </radialGradient>
        <radialGradient id="knob2" cx="35%" cy="30%" r="65%">
            <stop offset="0%"   stop-color="#58d68d"/>
            <stop offset="100%" stop-color="#1e8449"/>
        </radialGradient>
        <linearGradient id="active1" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#3498DB"/>
            <stop offset="100%" stop-color="#5dade2"/>
        </linearGradient>
        <linearGradient id="active2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#2ECC71"/>
            <stop offset="100%" stop-color="#58d68d"/>
        </linearGradient>
        <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#3498DB" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#9B59B6" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- Glow halo -->
    <ellipse cx="30" cy="30" rx="26" ry="24" fill="url(#glowGrad)"/>

    <!-- Drop shadows -->
    <g transform="translate(2,3)" opacity="0.15">
        <rect x="8" y="20" width="44" height="4" rx="2" fill="#000"/>
        <rect x="8" y="36" width="44" height="4" rx="2" fill="#000"/>
    </g>

    <!-- ── SLIDER 1 (blue, knob at ~60%) ── -->
    <rect x="8" y="20" width="44" height="4" rx="2"
          fill="url(#trackGrad)" stroke="#1a1a1a" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="8" y="20" width="26" height="4" rx="2" fill="url(#active1)"/>
    <circle cx="34" cy="22" r="9" fill="#000" opacity="0.15" transform="translate(1.5,2)"/>
    <circle cx="34" cy="22" r="9"
            fill="url(#knob1)" stroke="#1a1a1a" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="31" cy="19" r="3" fill="white" opacity="0.45"/>
    <circle cx="30.5" cy="18.5" r="1.2" fill="white" opacity="0.6"/>

    <!-- ── SLIDER 2 (green, knob at ~35%) ── -->
    <rect x="8" y="36" width="44" height="4" rx="2"
          fill="url(#trackGrad)" stroke="#1a1a1a" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="8" y="36" width="16" height="4" rx="2" fill="url(#active2)"/>
    <circle cx="24" cy="38" r="9" fill="#000" opacity="0.15" transform="translate(1.5,2)"/>
    <circle cx="24" cy="38" r="9"
            fill="url(#knob2)" stroke="#1a1a1a" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="21" cy="35" r="3" fill="white" opacity="0.45"/>
    <circle cx="20.5" cy="34.5" r="1.2" fill="white" opacity="0.6"/>
</svg>