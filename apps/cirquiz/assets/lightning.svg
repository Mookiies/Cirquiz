<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60">
    <defs>
        <!-- Main bolt gradient: bright yellow top to deep orange bottom -->
        <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%"   stop-color="#FFE033"/>
            <stop offset="60%"  stop-color="#F39C12"/>
            <stop offset="100%" stop-color="#E67E22"/>
        </linearGradient>
        <!-- Glow -->
        <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#FFE033" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#FFE033" stop-opacity="0"/>
        </radialGradient>
        <!-- Shadow gradient for depth on right side -->
        <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%"   stop-color="#E67E22" stop-opacity="0"/>
            <stop offset="100%" stop-color="#BF6100" stop-opacity="0.5"/>
        </linearGradient>
    </defs>

    <!-- Soft glow halo behind bolt -->
    <ellipse cx="30" cy="30" rx="22" ry="26" fill="url(#glowGrad)"/>

    <!-- Drop shadow bolt (offset dark copy) -->
    <path d="M37 5 L19 33 L29 33 L25 57 L43 25 L33 25 Z"
          fill="#7a4000" opacity="0.18"
          transform="translate(2,3)"/>

    <!-- Main bolt shape -->
    <path d="M37 5 L19 33 L29 33 L25 57 L43 25 L33 25 Z"
          fill="url(#boltGrad)"
          stroke="#1a1a1a" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Dark shading on right edge for 3D depth -->
    <path d="M37 5 L43 25 L33 25 L25 57 L27 57 L35 33 L29 33 L39 7 Z"
          fill="url(#shadowGrad)" opacity="0.4"/>

    <!-- Bright highlight streak down the left face -->
    <path d="M34 9 L22 31 L28 31"
          fill="none" stroke="white" stroke-width="3"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>

    <!-- Tiny inner highlight dot at tip -->
    <circle cx="35" cy="9" r="2" fill="white" opacity="0.5"/>

    <!-- Spark particles -->
    <circle cx="48" cy="14" r="2"   fill="#FFE033" stroke="#1a1a1a" stroke-width="1.2" opacity="0.9"/>
    <circle cx="52" cy="22" r="1.3" fill="#FFE033" opacity="0.7"/>
    <circle cx="12" cy="40" r="1.8" fill="#FFE033" stroke="#1a1a1a" stroke-width="1" opacity="0.8"/>
    <circle cx="9"  cy="32" r="1"   fill="#FFE033" opacity="0.6"/>
    <circle cx="47" cy="38" r="1.2" fill="#F39C12" opacity="0.7"/>

    <!-- Small spark lines -->
    <line x1="47" y1="11" x2="50" y2="9"  stroke="#FFE033" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="47" y1="11" x2="50" y2="13" stroke="#FFE033" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
    <line x1="13" y1="43" x2="10" y2="45" stroke="#FFE033" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="13" y1="43" x2="11" y2="40" stroke="#FFE033" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
</svg>