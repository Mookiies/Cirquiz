<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- body -->
  <ellipse cx="50" cy="68" rx="34" ry="24" fill="#F1C40F" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- body highlight -->
  <ellipse cx="38" cy="60" rx="12" ry="8" fill="white" opacity="0.2" transform="rotate(-15 38 60)"/>
  <!-- head -->
  <circle cx="68" cy="46" r="20" fill="#F1C40F" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- head highlight -->
  <ellipse cx="60" cy="38" rx="7" ry="9" fill="white" opacity="0.25" transform="rotate(-10 60 38)"/>
  <!-- beak -->
  <path d="M84 46 C90 44 94 46 94 50 C94 54 90 56 84 54Z" fill="#e67e22" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- nostril -->
  <circle cx="91" cy="48" r="1.2" fill="#d35400"/>
  <!-- eye -->
  <circle cx="72" cy="40" r="5.5" fill="white" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="73" cy="40" r="3" fill="#1a1a1a"/>
  <circle cx="74" cy="38.8" r="1" fill="white"/>
  <!-- eyelash -->
  <path d="M68 36 C70 33 74 33 76 36" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- wing -->
  <path d="M24 66 C18 60 18 52 26 52 C30 52 34 56 34 62Z" fill="#d4ac0d" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- water ripple -->
  <ellipse cx="50" cy="90" rx="30" ry="5" fill="none" stroke="#85c1e9" stroke-width="2" opacity="0.6"/>
  <ellipse cx="50" cy="90" rx="20" ry="3" fill="none" stroke="#85c1e9" stroke-width="1.5" opacity="0.4"/>

</svg>