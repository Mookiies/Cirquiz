  <circle cx="78" cy="38" r="10" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="16" cy="54" r="9" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="84" cy="54" r="9" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- ears -->
  <circle cx="24" cy="26" r="8" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="76" cy="26" r="8" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="24" cy="26" r="4" fill="#b2ebf2" opacity="0.7"/>
  <circle cx="76" cy="26" r="4" fill="#b2ebf2" opacity="0.7"/>
  <!-- head -->
  <circle cx="50" cy="44" r="28" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- fur texture on head -->
  <circle cx="26" cy="34" r="8" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="74" cy="34" r="8" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="34" cy="22" r="7" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="66" cy="22" r="7" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="50" cy="18" r="7" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- face highlight -->
  <ellipse cx="40" cy="34" rx="10" ry="12" fill="white" opacity="0.2" transform="rotate(-10 40 34)"/>
  <!-- snout -->
  <ellipse cx="50" cy="56" rx="14" ry="10" fill="#b2ebf2" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- eyes -->
  <circle cx="38" cy="42" r="7" fill="white" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="62" cy="42" r="7" fill="white" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="39" cy="43" r="4" fill="#1a1a1a"/>
  <circle cx="63" cy="43" r="4" fill="#1a1a1a"/>
  <circle cx="40.5" cy="41.5" r="1.5" fill="white"/>
  <circle cx="64.5" cy="41.5" r="1.5" fill="white"/>
  <!-- happy brow -->
  <path d="M32 36 C36 32 42 33 44 36" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M56 36 C58 33 64 32 68 36" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- mouth -->
  <path d="M42 60 Q50 66 58 60" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- nose -->
  <ellipse cx="50" cy="53" rx="4" ry="3" fill="#0097a7" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- body / feet -->
  <ellipse cx="50" cy="86" rx="22" ry="12" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="35" cy="90" r="8" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="65" cy="90" r="8" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- arms -->
  <circle cx="18" cy="68" r="9" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="82" cy="68" r="9" fill="#00BCD4" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

