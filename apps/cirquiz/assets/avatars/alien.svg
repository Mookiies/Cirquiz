<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- antennae -->
  <line x1="38" y1="18" x2="30" y2="8" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="29" cy="7" r="3.5" fill="#2ECC71" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="62" y1="18" x2="70" y2="8" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="71" cy="7" r="3.5" fill="#2ECC71" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- head -->
  <ellipse cx="50" cy="42" rx="28" ry="30" fill="#2ECC71" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- head highlight -->
  <ellipse cx="40" cy="30" rx="10" ry="12" fill="white" opacity="0.2" transform="rotate(-10 40 30)"/>
  <!-- body -->
  <path d="M36 68 C30 72 26 82 28 88 C30 94 70 94 72 88 C74 82 70 72 64 68Z" fill="#27ae60" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- big eyes -->
  <ellipse cx="38" cy="44" rx="10" ry="12" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="62" cy="44" rx="10" ry="12" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <ellipse cx="36" cy="41" rx="4" ry="5" fill="white" opacity="0.9"/>
  <ellipse cx="60" cy="41" rx="4" ry="5" fill="white" opacity="0.9"/>
  <circle cx="37" cy="42" r="1.5" fill="#1a1a1a"/>
  <circle cx="61" cy="42" r="1.5" fill="#1a1a1a"/>
  <!-- mouth -->
  <path d="M40 60 Q50 66 60 60" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- little arms -->
  <path d="M22 74 Q16 70 14 64" fill="none" stroke="#2ECC71" stroke-width="5" stroke-linecap="round"/>
  <path d="M78 74 Q84 70 86 64" fill="none" stroke="#2ECC71" stroke-width="5" stroke-linecap="round"/>

</svg>