<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- antenna -->
  <line x1="50" y1="14" x2="50" y2="8" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="6" r="3.5" fill="#1ABC9C" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- head -->
  <rect x="26" y="14" width="48" height="38" rx="8" fill="#1ABC9C" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- head shading top -->
  <rect x="26" y="14" width="48" height="12" rx="8" fill="#16a085" opacity="0.5"/>
  <!-- screen face -->
  <rect x="32" y="20" width="36" height="26" rx="4" fill="#0e6655" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- LED eyes -->
  <rect x="36" y="26" width="10" height="8" rx="2" fill="#48dbfb"/>
  <rect x="54" y="26" width="10" height="8" rx="2" fill="#48dbfb"/>
  <rect x="38" y="27.5" width="4" height="3" rx="1" fill="white" opacity="0.8"/>
  <rect x="56" y="27.5" width="4" height="3" rx="1" fill="white" opacity="0.8"/>
  <!-- pixel mouth -->
  <rect x="36" y="38" width="4" height="4" rx="1" fill="#1ABC9C"/>
  <rect x="42" y="36" width="4" height="6" rx="1" fill="#1ABC9C"/>
  <rect x="48" y="36" width="4" height="6" rx="1" fill="#1ABC9C"/>
  <rect x="54" y="36" width="4" height="6" rx="1" fill="#1ABC9C"/>
  <rect x="60" y="38" width="4" height="4" rx="1" fill="#1ABC9C"/>
  <!-- body -->
  <rect x="30" y="52" width="40" height="32" rx="6" fill="#17a589" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- chest panel -->
  <rect x="36" y="58" width="28" height="18" rx="3" fill="#148f77" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="44" cy="67" r="4" fill="#1ABC9C" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="56" cy="67" r="4" fill="#e74c3c" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- arms -->
  <rect x="14" y="54" width="14" height="22" rx="6" fill="#1ABC9C" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="72" y="54" width="14" height="22" rx="6" fill="#1ABC9C" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- feet -->
  <rect x="32" y="82" width="14" height="10" rx="4" fill="#148f77" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="54" y="82" width="14" height="10" rx="4" fill="#148f77" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

</svg>