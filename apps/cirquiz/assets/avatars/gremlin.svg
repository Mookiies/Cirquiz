  <path d="M20 62 Q12 66 10 74 Q14 76 18 72" fill="#9B59B6" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M80 62 Q88 66 90 74 Q86 76 82 72" fill="#9B59B6" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

