  <circle cx="38" cy="46" r="7" fill="#f9e04b" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="62" cy="46" r="7" fill="#f9e04b" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="39" cy="46" r="3.5" fill="#1a1a1a"/>
  <circle cx="63" cy="46" r="3.5" fill="#1a1a1a"/>
  <circle cx="40" cy="44.8" r="1.2" fill="white"/>
  <circle cx="64" cy="44.8" r="1.2" fill="white"/>
