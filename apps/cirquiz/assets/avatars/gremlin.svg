  <rect x="46" y="62" width="6" height="8" rx="1" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="54" y="62" width="6" height="7" rx="1" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
