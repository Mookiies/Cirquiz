<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">

  <!-- bottle body -->
  <path d="M36 42 C34 44 32 50 32 60 C32 72 36 84 42 88 C44 90 56 90 58 88 C64 84 68 72 68 60 C68 50 66 44 64 42Z" fill="#FF5722" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- bottle highlight -->
  <path d="M38 46 C36 50 36 60 38 70 C40 60 40 48 42 44Z" fill="white" opacity="0.2"/>
  <!-- label -->
  <rect x="34" y="58" width="32" height="22" rx="3" fill="#fff3e0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- neck -->
  <rect x="42" y="30" width="16" height="14" rx="4" fill="#e64a19" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- cap -->
  <rect x="40" y="22" width="20" height="10" rx="3" fill="#bf360c" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- flame on top -->
  <path d="M50 8 C46 12 44 16 46 20 C44 18 42 20 44 22 C42 20 48 14 50 8Z" fill="#f39c12"/>
  <path d="M50 8 C54 12 56 16 54 20 C56 18 58 20 56 22 C58 20 52 14 50 8Z" fill="#e74c3c"/>
  <path d="M50 10 C50 14 50 18 50 22 C48 18 50 10 50 10Z" fill="#f9ca24" opacity="0.8"/>
  <!-- little arms -->
  <path d="M32 56 Q22 52 18 58 Q20 64 26 62" fill="#FF5722" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M68 56 Q78 52 82 58 Q80 64 74 62" fill="#FF5722" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- face -->
  <circle cx="42" cy="50" r="3.5" fill="white" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="58" cy="50" r="3.5" fill="white" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="43" cy="50.5" r="1.8" fill="#1a1a1a"/>
  <circle cx="59" cy="50.5" r="1.8" fill="#1a1a1a"/>
  <path d="M42 55 Q50 60 58 55" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- sweat drop -->
  <path d="M30 48 C30 44 26 46 28 50 C30 52 32 50 30 48Z" fill="#85c1e9"/>

</svg>